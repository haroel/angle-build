name: Build and publish ANGLE XCFrameworks

on:
  workflow_dispatch:
    inputs:
      angle_ref:
        description: "ANGLE branch, tag, or commit (the monolithic patch is tested with chromium/7499)"
        required: true
        default: "chromium/7499"
      release_tag:
        description: "Release tag (empty creates angle-m143-build-<run id>)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: angle-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  ANGLE_REF: ${{ inputs.angle_ref || 'chromium/7499' }}
  ANGLE_REPO: https://chromium.googlesource.com/angle/angle.git
  DEPOT_TOOLS_REPO: https://chromium.googlesource.com/chromium/tools/depot_tools.git

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Create or reuse draft release
        id: release
        uses: actions/github-script@v7
        env:
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag || '' }}
        with:
          script: |
            const isTagPush = context.ref.startsWith('refs/tags/');
            const requestedTag = process.env.REQUESTED_RELEASE_TAG.trim();
            const releaseTag = isTagPush
              ? context.ref.substring('refs/tags/'.length)
              : requestedTag || `angle-m143-build-${context.runId}`;
            const angleRef = process.env.ANGLE_REF;
            const body = [
              `ANGLE ${angleRef} precompiled static XCFrameworks`,
              '',
              '- Renderer backend: Metal only',
              '- EGL and OpenGL ES entry points are folded into one complete `libANGLE.a`',
              '- Debug symbols, tests, capture, Vulkan, OpenGL and unused translators are disabled',
              '',
              '## Assets',
              '',
              '- `ANGLE-iOS.xcframework.zip`: iOS arm64 device + arm64 simulator',
              '- `ANGLE-macOS.xcframework.zip`: macOS arm64 (Apple Silicon)',
              '',
              'Each ZIP includes the XCFramework, ANGLE license, integration notes,',
              'source revision, checked-in args.gn and expanded GN arguments.',
              '',
              '**Download the ZIP assets below; do not use GitHub source archives as binaries.**'
            ].join('\n');

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            let release = releases.find(item => item.tag_name === releaseTag);

            if (!release) {
              const result = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: releaseTag,
                target_commitish: context.sha,
                name: `ANGLE ${angleRef} (${releaseTag})`,
                body,
                draft: true,
                prerelease: false
              });
              release = result.data;
            } else {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: `ANGLE ${angleRef} (${releaseTag})`,
                body
              });
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_tag', releaseTag);

  build-ios:
    name: Build iOS XCFramework
    needs: create-release
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone --depth 1 "$DEPOT_TOOLS_REPO" depot_tools
          echo "$GITHUB_WORKSPACE/depot_tools" >> "$GITHUB_PATH"

      - name: Checkout ANGLE and dependencies
        run: |
          mkdir -p angle-src/angle
          git -C angle-src/angle init
          git -C angle-src/angle remote add origin "$ANGLE_REPO"
          git -C angle-src/angle fetch --depth 1 origin "$ANGLE_REF"
          git -C angle-src/angle checkout --detach FETCH_HEAD

          cat > angle-src/.gclient <<'GCLIENT'
          solutions = [
            {
              "name": "angle",
              "url": "https://chromium.googlesource.com/angle/angle.git",
              "managed": False,
              "custom_deps": {},
            },
          ]
          target_os = ["ios"]
          GCLIENT

          cd angle-src
          gclient sync -D --no-history --force --reset

      - name: Make the ANGLE archive self-contained
        run: |
          cd angle-src/angle
          git apply --check "$GITHUB_WORKSPACE/patches/angle-complete-static-library.patch"
          git apply "$GITHUB_WORKSPACE/patches/angle-complete-static-library.patch"

      - name: Build iOS device
        run: |
          cd angle-src/angle
          mkdir -p out/ios-device
          cp "$GITHUB_WORKSPACE/args.ios.arm64.gn" out/ios-device/args.gn
          gn gen out/ios-device
          autoninja -C out/ios-device libEGL_static
          gn args out/ios-device --list > out/ios-device/args.full.txt
          test -f out/ios-device/obj/libEGL_static.a
          ! file out/ios-device/obj/libEGL_static.a | grep -q 'thin archive'

      - name: Build iOS simulator
        run: |
          cd angle-src/angle
          mkdir -p out/ios-simulator
          cp "$GITHUB_WORKSPACE/args.ios.arm64.simulator.gn" out/ios-simulator/args.gn
          gn gen out/ios-simulator
          autoninja -C out/ios-simulator libEGL_static
          gn args out/ios-simulator --list > out/ios-simulator/args.full.txt
          test -f out/ios-simulator/obj/libEGL_static.a
          ! file out/ios-simulator/obj/libEGL_static.a | grep -q 'thin archive'

      - name: Create and verify XCFramework
        run: |
          cd angle-src/angle
          mkdir -p staging/Headers staging/device staging/simulator dist/ANGLE-iOS/build-config
          cp -R include/EGL include/GLES2 include/GLES3 include/KHR staging/Headers/
          cp out/ios-device/obj/libEGL_static.a staging/device/libANGLE.a
          cp out/ios-simulator/obj/libEGL_static.a staging/simulator/libANGLE.a

          xcodebuild -create-xcframework \
            -library staging/device/libANGLE.a \
            -headers staging/Headers \
            -library staging/simulator/libANGLE.a \
            -headers staging/Headers \
            -output dist/ANGLE-iOS/ANGLE.xcframework

          nm -gU staging/device/libANGLE.a | grep -q '_eglGetDisplay$'
          nm -gU staging/device/libANGLE.a | grep -q '_glClear$'
          test "$(lipo -archs staging/device/libANGLE.a)" = "arm64"
          test "$(lipo -archs staging/simulator/libANGLE.a)" = "arm64"
          plutil -lint dist/ANGLE-iOS/ANGLE.xcframework/Info.plist
          plutil -p dist/ANGLE-iOS/ANGLE.xcframework/Info.plist | grep -q 'simulator'

          xcrun --sdk iphonesimulator clang++ \
            -std=c++20 -target arm64-apple-ios12.0-simulator \
            -x objective-c++ -I staging/Headers -c -o staging/smoke.o - <<'SOURCE'
          #include <EGL/egl.h>
          #include <GLES2/gl2.h>
          int main() {
              EGLDisplay display = eglGetDisplay(EGL_DEFAULT_DISPLAY);
              glClear(GL_COLOR_BUFFER_BIT);
              return display == EGL_NO_DISPLAY;
          }
          SOURCE
          xcrun --sdk iphonesimulator clang++ \
            -target arm64-apple-ios12.0-simulator \
            staging/smoke.o staging/simulator/libANGLE.a -ObjC \
            -framework Metal -framework QuartzCore -framework IOSurface \
            -framework Foundation -framework CoreFoundation \
            -framework CoreGraphics \
            -o staging/angle-link-smoke

          cp LICENSE dist/ANGLE-iOS/
          cp "$GITHUB_WORKSPACE/PACKAGE_README.md" dist/ANGLE-iOS/README.md
          cp out/ios-device/args.gn dist/ANGLE-iOS/build-config/args.ios.arm64.gn
          cp out/ios-device/args.full.txt dist/ANGLE-iOS/build-config/args.ios.arm64.full.txt
          cp out/ios-simulator/args.gn dist/ANGLE-iOS/build-config/args.ios.arm64.simulator.gn
          cp out/ios-simulator/args.full.txt dist/ANGLE-iOS/build-config/args.ios.arm64.simulator.full.txt
          {
            echo "ANGLE_REF=$ANGLE_REF"
            echo "ANGLE_COMMIT=$(git rev-parse HEAD)"
            echo "XCODE_VERSION=$(xcodebuild -version | tr '\n' ' ')"
          } > dist/ANGLE-iOS/build-config/BUILD_INFO.txt

          ditto -c -k --sequesterRsrc --keepParent \
            dist/ANGLE-iOS "$GITHUB_WORKSPACE/ANGLE-iOS.xcframework.zip"
          ls -lh "$GITHUB_WORKSPACE/ANGLE-iOS.xcframework.zip"

      - name: Upload iOS package to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-ios-release
          path: ANGLE-iOS.xcframework.zip
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  build-macos:
    name: Build macOS XCFramework
    needs: create-release
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone --depth 1 "$DEPOT_TOOLS_REPO" depot_tools
          echo "$GITHUB_WORKSPACE/depot_tools" >> "$GITHUB_PATH"

      - name: Checkout ANGLE and dependencies
        run: |
          mkdir -p angle-src/angle
          git -C angle-src/angle init
          git -C angle-src/angle remote add origin "$ANGLE_REPO"
          git -C angle-src/angle fetch --depth 1 origin "$ANGLE_REF"
          git -C angle-src/angle checkout --detach FETCH_HEAD

          cat > angle-src/.gclient <<'GCLIENT'
          solutions = [
            {
              "name": "angle",
              "url": "https://chromium.googlesource.com/angle/angle.git",
              "managed": False,
              "custom_deps": {},
            },
          ]
          target_os = ["mac"]
          GCLIENT

          cd angle-src
          gclient sync -D --no-history --force --reset

      - name: Make the ANGLE archive self-contained
        run: |
          cd angle-src/angle
          git apply --check "$GITHUB_WORKSPACE/patches/angle-complete-static-library.patch"
          git apply "$GITHUB_WORKSPACE/patches/angle-complete-static-library.patch"

      - name: Ensure the Metal compiler is available
        run: |
          metal_test_dir=$(mktemp -d)
          printf '%s\n' 'using namespace metal; kernel void empty_kernel() {}' > "$metal_test_dir/test.metal"
          if ! xcrun -sdk macosx metal -c "$metal_test_dir/test.metal" -o "$metal_test_dir/test.air"; then
            sudo xcodebuild -downloadComponent MetalToolchain
            xcrun -sdk macosx metal -c "$metal_test_dir/test.metal" -o "$metal_test_dir/test.air"
          fi

      - name: Build macOS arm64
        run: |
          cd angle-src/angle
          mkdir -p out/macos-arm64
          cp "$GITHUB_WORKSPACE/args.mac.arm64.gn" out/macos-arm64/args.gn
          gn gen out/macos-arm64
          autoninja -C out/macos-arm64 libEGL_static
          gn args out/macos-arm64 --list > out/macos-arm64/args.full.txt
          test -f out/macos-arm64/obj/libEGL_static.a
          ! file out/macos-arm64/obj/libEGL_static.a | grep -q 'thin archive'

      - name: Create and verify XCFramework
        run: |
          cd angle-src/angle
          mkdir -p staging/Headers staging/macos-arm64 dist/ANGLE-macOS/build-config
          cp -R include/EGL include/GLES2 include/GLES3 include/KHR staging/Headers/
          cp out/macos-arm64/obj/libEGL_static.a staging/macos-arm64/libANGLE.a

          xcodebuild -create-xcframework \
            -library staging/macos-arm64/libANGLE.a \
            -headers staging/Headers \
            -output dist/ANGLE-macOS/ANGLE.xcframework

          nm -gU staging/macos-arm64/libANGLE.a | grep -q '_eglGetDisplay$'
          nm -gU staging/macos-arm64/libANGLE.a | grep -q '_glClear$'
          test "$(lipo -archs staging/macos-arm64/libANGLE.a)" = "arm64"
          plutil -lint dist/ANGLE-macOS/ANGLE.xcframework/Info.plist
          plutil -p dist/ANGLE-macOS/ANGLE.xcframework/Info.plist | grep -q 'macos'

          xcrun clang++ -std=c++20 -x objective-c++ -I staging/Headers \
            -c -o staging/smoke.o - <<'SOURCE'
          #include <EGL/egl.h>
          #include <GLES2/gl2.h>
          int main() {
              EGLDisplay display = eglGetDisplay(EGL_DEFAULT_DISPLAY);
              glClear(GL_COLOR_BUFFER_BIT);
              return display == EGL_NO_DISPLAY;
          }
          SOURCE
          xcrun clang++ staging/smoke.o staging/macos-arm64/libANGLE.a -ObjC \
            -framework Metal -framework QuartzCore -framework IOSurface \
            -framework Foundation -framework CoreFoundation \
            -framework CoreGraphics -framework Cocoa -framework IOKit \
            -o staging/angle-link-smoke

          cp LICENSE dist/ANGLE-macOS/
          cp "$GITHUB_WORKSPACE/PACKAGE_README.md" dist/ANGLE-macOS/README.md
          cp out/macos-arm64/args.gn dist/ANGLE-macOS/build-config/args.mac.arm64.gn
          cp out/macos-arm64/args.full.txt dist/ANGLE-macOS/build-config/args.mac.arm64.full.txt
          {
            echo "ANGLE_REF=$ANGLE_REF"
            echo "ANGLE_COMMIT=$(git rev-parse HEAD)"
            echo "XCODE_VERSION=$(xcodebuild -version | tr '\n' ' ')"
          } > dist/ANGLE-macOS/build-config/BUILD_INFO.txt

          ditto -c -k --sequesterRsrc --keepParent \
            dist/ANGLE-macOS "$GITHUB_WORKSPACE/ANGLE-macOS.xcframework.zip"
          ls -lh "$GITHUB_WORKSPACE/ANGLE-macOS.xcframework.zip"

      - name: Upload macOS package to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-macos-release
          path: ANGLE-macOS.xcframework.zip
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  publish-release:
    name: Upload assets and publish release
    needs: [create-release, build-ios, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: angle-*-release
          path: release-assets
          merge-multiple: true

      - name: Upload ZIP assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*.zip)
          test "${#assets[@]}" -eq 2
          gh release upload "$RELEASE_TAG" "${assets[@]}" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false
            });
